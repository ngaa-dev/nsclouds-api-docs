openapi: 3.1.0
info:
  $ref: ../_common.yaml#/info
servers:
  $ref: ../_common.yaml#/servers

tags:
  # 引用公共文件中的顶级功能标签（用于保持导航层级）
  - $ref: ../_common.yaml#/tags/0   # chat_completions
  - $ref: ../_common.yaml#/tags/1   # embeddings
  - $ref: ../_common.yaml#/tags/2   # image_generations
  - $ref: ../_common.yaml#/tags/3   # image_edits
  - $ref: ../_common.yaml#/tags/4   # audio_transcriptions

  # ========== 深度求索厂家标签 ==========
  - name: chat_completions_deepseek
    x-parent: chat_completions
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的对话生成 API
  - name: embeddings_deepseek
    x-parent: embeddings
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的向量嵌入 API
  - name: image_generations_deepseek
    x-parent: image_generations
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的图片生成 API
  - name: image_edits_deepseek
    x-parent: image_edits
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的图片编辑 API
  - name: audio_transcriptions_deepseek
    x-parent: audio_transcriptions
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的音频转录 API

  # ========== 深度求索协议标签（以 OpenAI 协议为例） ==========
  # - name: chat_completions_deepseek_openai
  #   x-parent: chat_completions_deepseek
  #   x-page-title: OpenAI 协议
  #   x-page-icon: check-circle
  #   description: 深度求索（DeepSeek）支持 OpenAI 协议的对话生成 API
  # - name: embeddings_deepseek_openai
  #   x-parent: embeddings_deepseek
  #   x-page-title: OpenAI 协议
  #   x-page-icon: check-circle
  #   description: 深度求索（DeepSeek）支持 OpenAI 协议的向量嵌入 API
  # - name: image_generations_deepseek_openai
  #   x-parent: image_generations_deepseek
  #   x-page-title: OpenAI 协议
  #   x-page-icon: check-circle
  #   description: 深度求索（DeepSeek）支持 OpenAI 协议的图片生成 API
  # - name: image_edits_deepseek_openai
  #   x-parent: image_edits_deepseek
  #   x-page-title: OpenAI 协议
  #   x-page-icon: check-circle
  #   description: 深度求索（DeepSeek）支持 OpenAI 协议的图片编辑 API
  # - name: audio_transcriptions_deepseek_openai
  #   x-parent: audio_transcriptions_deepseek
  #   x-page-title: OpenAI 协议
  #   x-page-icon: check-circle
  #   description: 深度求索（DeepSeek）支持 OpenAI 协议的音频转录 API

paths:
  # ========== 对话生成 ==========
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_deepseek
        # - chat_completions_deepseek_openai
      summary: 创建聊天补全
      description: 基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。
      operationId: createChatCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: 基础示例
                value:
                  model: deepseek-chat
                  messages:
                    - role: user
                      content: Hello!
                  temperature: 1
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  /v1/completions:
    post:
      tags:
        - chat_completions_deepseek
        # - chat_completions_deepseek_openai
      summary: 创建文本补全
      description: 基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。
      operationId: createCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                value:
                  model: deepseek-chat
                  prompt: Once upon a time
                  max_tokens: 50
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 向量嵌入 ==========
  /v1/embeddings:
    post:
      tags:
        - embeddings_deepseek
        # - embeddings_deepseek_openai
      summary: 创建嵌入向量
      description: 获取给定输入的向量表示。与 OpenAI 的 Embeddings API 兼容。
      operationId: createEmbedding_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
            examples:
              default:
                value:
                  model: deepseek-embed
                  input: Hello world
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 图片生成 ==========
  /v1/images/generations:
    post:
      tags:
        - image_generations_deepseek
        # - image_generations_deepseek_openai
      summary: 创建图像
      description: 根据文本提示生成图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageGeneration_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                value:
                  model: deepseek-image
                  prompt: A cat sitting on a windowsill
                  n: 1
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 图片编辑 ==========
  /v1/images/edits:
    post:
      tags:
        - image_edits_deepseek
        # - image_edits_deepseek_openai
      summary: 编辑图像
      description: 根据原始图像和文本提示创建编辑后的图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageEdit_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            encoding:
              images:
                style: form
                explode: true
            examples:
              default:
                value:
                  model: deepseek-image
                  images:
                    - (binary)
                  prompt: Add a hat
                  n: 1
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 音频转录 ==========
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions_deepseek
        # - audio_transcriptions_deepseek_openai
      summary: 音频转录
      description: 将音频文件转录为文本。与 OpenAI 的 Audio API 兼容。
      operationId: createTranscription_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
            examples:
              default:
                value:
                  model: deepseek-whisper
                  file: (binary)
                  language: en
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

components:
  $ref: ../_common.yaml#/components