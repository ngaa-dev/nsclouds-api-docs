openapi: 3.1.0
info:
  title: LiteLLM API Documentation
  description: 'Self-hosted LiteLLM gateway API documentation, fully compatible with OpenAI format.'
  version: 1.11.0
servers:
  - url: 'https://aillm.nscloud.ai'
    description: Global Server
tags:
  - name: chat_completions
    x-page-title: Chat Completions
    x-page-icon: message
    description: 'Chat completion related APIs, including chat completions and text completions'
  - name: embeddings
    x-page-title: Embeddings
    x-page-icon: database
    description: Embedding related APIs for generating vector representations of text
  - name: image_generations
    x-page-title: Image Generations
    x-page-icon: image
    description: Image generation related APIs for creating images from text prompts
  - name: image_edits
    x-page-title: Image Edits
    x-page-icon: edit
    description: Image editing related APIs for creating edited images from original images and prompts
  - name: audio_transcriptions
    x-page-title: Audio Transcriptions
    x-page-icon: microphone
    description: Audio transcription related APIs for transcribing audio files to text
  - name: chat_completions_deepseek
    x-parent: chat_completions
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek's chat completion API
  - name: embeddings_deepseek
    x-parent: embeddings
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek's vector embedding API
  - name: image_generations_deepseek
    x-parent: image_generations
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek's image generation API
  - name: image_edits_deepseek
    x-parent: image_edits
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek's image editing API
  - name: audio_transcriptions_deepseek
    x-parent: audio_transcriptions
    x-page-title: DeepSeek
    x-page-icon: brain
    description: DeepSeek's audio transcription API
paths:
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_deepseek
      summary: Create chat completion
      description: Generate model response based on input messages. Fully compatible with OpenAI's Chat API.
      operationId: createChatCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple conversation example with system prompt and user message.
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: user
                      content: Hello!
                  stream: true
              image_input:
                summary: Image Input (Multimodal)
                description: Use vision-enabled model to analyze images.
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What is in this image?
                        - type: image_url
                          image_url:
                            url: 'https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png'
                  max_completion_tokens: 300
              functions:
                summary: Function Calling
                description: Define tools (functions) and let the model decide whether to call them.
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: user
                      content: What is the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: 'The city and state, e.g. San Francisco, CA'
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic chat request.
                  value:
                    id: chatcmpl-cdc11700-f52c-99a3-866c-cfac2a0b254c
                    object: chat.completion
                    created: 1772859125
                    model: deepseek-v3.1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: "Hello! How can I help you today? \U0001F60A"
                        finish_reason: stop
                    usage:
                      prompt_tokens: 15
                      completion_tokens: 11
                      total_tokens: 26
                image_input-response:
                  summary: Image Input Response
                  description: Model's description generated based on image content.
                  value:
                    id: chatcmpl-856cd72d-f840-92da-a0b3-65f0061ac378
                    object: chat.completion
                    created: 1772861532
                    model: deepseek-v3.1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: |-
                            Of course. This is an image of a stylized, cartoon-style drawing of a **dragon wearing a backpack and holding a walking stick**.

                            Here are the details:

                            *   **Main Subject:** A friendly-looking dragon.
                            *   **Attire/Accessories:**
                                *   It's wearing a **backpack** with a strap across its chest.
                                *   It's holding a long **walking stick** or trekking pole in its right hand (claw).
                            *   **Setting:** The dragon appears to be on a journey or hike, walking on a simple ground line.
                            *   **Style:** The image is a black and white line drawing, likely intended as a coloring page for children. The lines are clear and simple, making it easy to color.

                            In short, it's an illustration of an adventurous dragon, ready for a hike or a quest.
                        finish_reason: stop
                    usage:
                      prompt_tokens: 13
                      completion_tokens: 179
                      total_tokens: 192
                functions-response:
                  summary: Function Call Response
                  description: Model returns a function call request.
                  value:
                    id: chatcmpl-7709ac0a-5dc2-9791-81ef-1364bf331761
                    object: chat.completion
                    created: 1772861551
                    model: deepseek-v3.1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: I'll check the current weather in Boston for
                          tool_calls:
                            - id: chatcmpl-tool-6701c1adf7ab40b598c423c3530190b9
                              type: function
                              function:
                                name: get_current_weather
                                arguments: '{"location": "Boston, MA"}'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 198
                      completion_tokens: 28
                      total_tokens: 226
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events format, each event is a line of JSON data block starting with ''data: '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming chat process.
                  value: "data: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"Hello\",\"role\":\"assistant\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"! How\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\" can I help\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\" you today\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"? \U0001F60A\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"finish_reason\":\"stop\",\"index\":0,\"delta\":{}}]}\ndata: [DONE]\n"
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/completions:
    post:
      tags:
        - chat_completions_deepseek
      summary: Create text completion
      description: Generate one or more completions based on the provided prompt. Compatible with OpenAI's Completions API.
      operationId: createCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: Basic
                description: A simple text completion example.
                value:
                  model: volcengine/deepseek-v3-1-terminus
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  'n': 1
                  stream: false
              streaming:
                summary: Streaming
                description: 'Enable streaming response by setting stream: true.'
                value:
                  model: volcengine/deepseek-v3-1-terminus
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  stream: true
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Response example corresponding to basic text completion request.
                  value:
                    id: 02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9
                    object: text_completion
                    created: 1772861365
                    model: volcengine/deepseek-v3-1-terminus
                    choices:
                      - text: This is a test.
                        index: 0
                        finish_reason: stop
                    usage:
                      prompt_tokens: 10
                      completion_tokens: 6
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: 'Streaming response is returned in Server-Sent Events format, each event is a line of JSON data block starting with ''data: '', ending with ''data: [DONE]''.'
              examples:
                streaming-response:
                  summary: Streaming Response Example
                  description: Shows events sent sequentially during streaming text completion process.
                  value: |
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":"This","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":" is","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":" a","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":" test","index":0,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":".","index":0,"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/embeddings:
    post:
      tags:
        - embeddings_deepseek
      summary: Create embedding vectors
      description: Get vector representation of given input. Compatible with OpenAI's Embeddings API.
      operationId: createEmbedding_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
            examples:
              default:
                summary: Basic
                description: Generate embedding vector for a single string input.
                value:
                  model: deepseek-embed
                  input: The quick brown fox jumps over the lazy dog
              multiple-inputs:
                summary: Multiple Inputs
                description: Generate embedding vectors for multiple string inputs.
                value:
                  model: deepseek-embed
                  input:
                    - Hello world
                    - DeepSeek is amazing
              base64-format:
                summary: Base64 Format
                description: Return embedding vectors in base64 encoding.
                value:
                  model: deepseek-embed
                  input: Example text
                  encoding_format: base64
              with-dimensions:
                summary: Specify Dimensions
                description: Specify output dimensions.
                value:
                  model: deepseek-embed
                  input: Example text
                  dimensions: 256
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Basic response corresponding to single input.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - -0.006929283495992422
                          - -0.005336422007530928
                          - -0.024047505110502243
                        index: 0
                    model: deepseek-embed
                    usage:
                      prompt_tokens: 8
                      total_tokens: 8
                multiple-inputs-response:
                  summary: Multiple Inputs Response
                  description: 'Response corresponding to multiple inputs, containing multiple embedding vectors.'
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - 0.1
                          - 0.2
                          - 0.3
                        index: 0
                      - object: embedding
                        embedding:
                          - 0.4
                          - 0.5
                          - 0.6
                        index: 1
                    model: deepseek-embed
                    usage:
                      prompt_tokens: 6
                      total_tokens: 6
                base64-response:
                  summary: Base64 Response
                  description: Embedding vectors returned in base64 encoding.
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding: YmFzZTY0X2VuY29kZWRfZGF0YQ==
                        index: 0
                    model: deepseek-embed
                    usage:
                      prompt_tokens: 2
                      total_tokens: 2
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/generations:
    post:
      tags:
        - image_generations_deepseek
      summary: Create image
      description: Generate image based on text prompt. Compatible with OpenAI's Images API.
      operationId: createImageGeneration_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                summary: Basic
                description: Generate a 1024x1024 image.
                value:
                  model: deepseek-image
                  prompt: A cute cat sitting on a windowsill
                  'n': 1
                  size: 1024x1024
              hd-quality:
                summary: HD Quality
                description: Generate high-definition quality image.
                value:
                  model: deepseek-image
                  prompt: A futuristic cityscape at sunset
                  'n': 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 Format
                description: Return base64-encoded image data.
                value:
                  model: deepseek-image
                  prompt: A beautiful landscape
                  'n': 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Basic Response
                  description: Complete response including image URL and optional fields.
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: 'https://example.com/images/cat.png'
                        revised_prompt: 'A cute cat sitting on a windowsill, looking out at a garden'
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 Response
                  description: Response containing base64-encoded image data and optional fields.
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                        revised_prompt: A beautiful landscape with mountains and a lake
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/edits:
    post:
      tags:
        - image_edits_deepseek
      summary: Edit image
      description: Create edited image based on original image and text prompt. Compatible with OpenAI's Images API.
      operationId: createImageEdit_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            encoding:
              images:
                style: form
                explode: true
            examples:
              with-mask:
                summary: With Mask
                description: 'Edit using image, mask, and prompt.'
                value:
                  model: deepseek-image
                  images:
                    - '@person.png'
                  mask: '@mask.png'
                  prompt: Add a hat to the person
                  'n': 1
                  size: 1024x1024
              no-mask:
                summary: Without Mask
                description: Edit using only image and prompt.
                value:
                  model: deepseek-image
                  images:
                    - '@body-lotion.png'
                  prompt: Change the background to a beach
                  'n': 1
                  size: 1024x1024
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: Edit Response
                  description: Return edited image and related metadata.
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: 'https://example.com/images/edited.png'
                        revised_prompt: 'A person with a hat, standing in a sunny park'
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions_deepseek
      summary: Audio transcription
      description: Transcribe audio file to text. Compatible with OpenAI's Audio API.
      operationId: createTranscription_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
            examples:
              default:
                summary: Basic
                description: Transcribe audio file to JSON format.
                value:
                  model: deepseek-whisper
                  file: (binary)
                  response_format: json
              with-timestamps:
                summary: With Timestamps
                description: Get detailed transcription with word-level timestamps.
                value:
                  model: deepseek-whisper
                  file: (binary)
                  response_format: verbose_json
                  timestamp_granularities:
                    - word
              srt-format:
                summary: SRT Subtitles
                description: Return transcription in SRT subtitle format.
                value:
                  model: deepseek-whisper
                  file: (binary)
                  response_format: srt
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
              examples:
                json-response:
                  summary: JSON Response
                  description: Default JSON format transcription.
                  value:
                    text: 'Hello, this is a test transcription.'
                verbose-json-response:
                  summary: Verbose JSON Response
                  description: Detailed transcription with word-level timestamps.
                  value:
                    task: transcribe
                    language: english
                    duration: 2.95
                    text: 'Hello, this is a test transcription.'
                    words:
                      - word: Hello
                        start: 0.1
                        end: 0.5
                      - word: this
                        start: 0.6
                        end: 0.8
                      - word: is
                        start: 0.9
                        end: 1
                      - word: a
                        start: 1.1
                        end: 1.2
                      - word: test
                        start: 1.3
                        end: 1.8
                      - word: transcription
                        start: 1.9
                        end: 2.8
            application/x-srt:
              schema:
                type: string
                description: Transcription in SRT subtitle format.
              examples:
                srt-response:
                  summary: SRT Response
                  value: |
                    1
                    00:00:00,100 --> 00:00:00,500
                    Hello

                    2
                    00:00:00,600 --> 00:00:00,800
                    this

                    3
                    00:00:00,900 --> 00:00:01,000
                    is

                    4
                    00:00:01,100 --> 00:00:01,200
                    a

                    5
                    00:00:01,300 --> 00:00:01,800
                    test

                    6
                    00:00:01,900 --> 00:00:02,800
                    transcription
            text/plain:
              schema:
                type: string
                description: Transcription in plain text format.
              examples:
                text-response:
                  summary: Plain Text Response
                  value: 'Hello, this is a test transcription.'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
components:
  schemas:
    CreateChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: The model ID to use
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum:
                  - system
                  - user
                  - assistant
                  - tool
              content:
                oneOf:
                  - type: string
                  - type: array
                    items:
                      oneOf:
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - text
                            text:
                              type: string
                          required:
                            - type
                            - text
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - image_url
                            image_url:
                              type: object
                              properties:
                                url:
                                  type: string
                              required:
                                - url
                          required:
                            - type
                            - image_url
            required:
              - role
              - content
        temperature:
          type: number
          default: 1
        max_completion_tokens:
          type: integer
        'n':
          type: integer
          default: 1
        stream:
          type: boolean
          default: false
      required:
        - model
        - messages
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                type: object
                properties:
                  role:
                    type: string
                  content:
                    type:
                      - string
                      - 'null'
              finish_reason:
                type:
                  - string
                  - 'null'
        usage:
          type: object
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
    CreateCompletionRequest:
      type: object
      properties:
        model:
          type: string
          description: The model ID to use
        prompt:
