openapi: 3.1.0
info:
  title: LiteLLM API 文档
  description: 自建 LiteLLM 网关的 API 文档，完全兼容 OpenAI 格式。
  version: 1.11.0
servers:
  - url: 'https://aillm.sinocache.net'
    description: LiteLLM 网关服务器
tags:
  - name: chat_completions
    x-page-title: 对话生成
    x-page-icon: message
    description: 对话生成相关的 API，包括聊天补全和文本补全
  - name: embeddings
    x-page-title: 向量嵌入
    x-page-icon: database
    description: 向量嵌入相关的 API，用于生成文本的向量表示
  - name: image_generations
    x-page-title: 图片生成
    x-page-icon: image
    description: 图片生成相关的 API，根据文本提示生成图像
  - name: image_edits
    x-page-title: 图片编辑
    x-page-icon: edit
    description: 图片编辑相关的 API，根据原始图像和提示创建编辑后的图像
  - name: audio_transcriptions
    x-page-title: 音频转录
    x-page-icon: microphone
    description: 音频转录相关的 API，将音频文件转录为文本
  - name: chat_completions_deepseek
    x-parent: chat_completions
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的对话生成 API
  - name: embeddings_deepseek
    x-parent: embeddings
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的向量嵌入 API
  - name: image_generations_deepseek
    x-parent: image_generations
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的图片生成 API
  - name: image_edits_deepseek
    x-parent: image_edits
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的图片编辑 API
  - name: audio_transcriptions_deepseek
    x-parent: audio_transcriptions
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的音频转录 API
paths:
  /v1/chat/completions:
    post:
      tags:
        - chat_completions_deepseek
      summary: 创建聊天补全
      description: 基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。
      operationId: createChatCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: user
                      content: Hello!
                  stream: true
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What is in this image?
                        - type: image_url
                          image_url:
                            url: 'https://ark-project.tos-cn-beijing.volces.com/doc_image/seedream4_5_imageToimage.png'
                  max_completion_tokens: 300
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: deepseek-v3.1
                  messages:
                    - role: user
                      content: What is the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: 'The city and state, e.g. San Francisco, CA'
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-cdc11700-f52c-99a3-866c-cfac2a0b254c
                    object: chat.completion
                    created: 1772859125
                    model: deepseek-v3.1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: "Hello! How can I help you today? \U0001F60A"
                        finish_reason: stop
                    usage:
                      prompt_tokens: 15
                      completion_tokens: 11
                      total_tokens: 26
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-856cd72d-f840-92da-a0b3-65f0061ac378
                    object: chat.completion
                    created: 1772861532
                    model: deepseek-v3.1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: |-
                            Of course. This is an image of a stylized, cartoon-style drawing of a **dragon wearing a backpack and holding a walking stick**.

                            Here are the details:

                            *   **Main Subject:** A friendly-looking dragon.
                            *   **Attire/Accessories:**
                                *   It's wearing a **backpack** with a strap across its chest.
                                *   It's holding a long **walking stick** or trekking pole in its right hand (claw).
                            *   **Setting:** The dragon appears to be on a journey or hike, walking on a simple ground line.
                            *   **Style:** The image is a black and white line drawing, likely intended as a coloring page for children. The lines are clear and simple, making it easy to color.

                            In short, it's an illustration of an adventurous dragon, ready for a hike or a quest.
                        finish_reason: stop
                    usage:
                      prompt_tokens: 13
                      completion_tokens: 179
                      total_tokens: 192
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: chatcmpl-7709ac0a-5dc2-9791-81ef-1364bf331761
                    object: chat.completion
                    created: 1772861551
                    model: deepseek-v3.1
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: I'll check the current weather in Boston for
                          tool_calls:
                            - id: chatcmpl-tool-6701c1adf7ab40b598c423c3530190b9
                              type: function
                              function:
                                name: get_current_weather
                                arguments: '{"location": "Boston, MA"}'
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 198
                      completion_tokens: 28
                      total_tokens: 226
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的 JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: "data: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"Hello\",\"role\":\"assistant\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"! How\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\" can I help\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\" you today\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"index\":0,\"delta\":{\"content\":\"? \U0001F60A\"}}]}\ndata: {\"id\":\"chatcmpl-2e08cd46-ddf8-9aef-bce0-f94395447528\",\"object\":\"chat.completion.chunk\",\"created\":1772861378,\"model\":\"deepseek-v3.1\",\"choices\":[{\"finish_reason\":\"stop\",\"index\":0,\"delta\":{}}]}\ndata: [DONE]\n"
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/completions:
    post:
      tags:
        - chat_completions_deepseek
      summary: 创建文本补全
      description: 基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。
      operationId: createCompletion_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的文本补全示例。
                value:
                  model: volcengine/deepseek-v3-1-terminus
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  'n': 1
                  stream: false
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: volcengine/deepseek-v3-1-terminus
                  prompt: Say this is a test
                  max_tokens: 7
                  temperature: 0
                  stream: true
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础文本补全请求的响应示例。
                  value:
                    id: 02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9
                    object: text_completion
                    created: 1772861365
                    model: volcengine/deepseek-v3-1-terminus
                    choices:
                      - text: This is a test.
                        index: 0
                        logprobs: null
                        finish_reason: stop
                    usage:
                      prompt_tokens: 10
                      completion_tokens: 6
                      total_tokens: 16
            text/event-stream:
              schema:
                type: string
                description: '流式响应以 Server-Sent Events 格式返回，每个事件是一行以 ''data: '' 开头的 JSON 数据块，最后以 ''data: [DONE]'' 结束。'
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式文本补全过程中陆续发送的事件。
                  value: |
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":"This","index":0,"logprobs":null,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":" is","index":0,"logprobs":null,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":" a","index":0,"logprobs":null,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":" test","index":0,"logprobs":null,"finish_reason":null}]}
                    data: {"id":"02177286136439468d44c5a45de4f1e59cc8a01ee3524bc4cf5a9","object":"text_completion","created":1772861365,"model":"volcengine/deepseek-v3-1-terminus","choices":[{"text":".","index":0,"logprobs":null,"finish_reason":"stop"}]}
                    data: [DONE]
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/embeddings:
    post:
      tags:
        - embeddings_deepseek
      summary: 创建嵌入向量
      description: 获取给定输入的向量表示。与 OpenAI 的 Embeddings API 兼容。
      operationId: createEmbedding_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
            examples:
              default:
                summary: 基础
                description: 对单个字符串输入生成嵌入向量。
                value:
                  model: deepseek-embed
                  input: The quick brown fox jumps over the lazy dog
              multiple-inputs:
                summary: 多输入
                description: 对多个字符串输入生成嵌入向量。
                value:
                  model: deepseek-embed
                  input:
                    - Hello world
                    - DeepSeek is amazing
              base64-format:
                summary: Base64 格式
                description: 以 base64 编码返回嵌入向量。
                value:
                  model: deepseek-embed
                  input: Example text
                  encoding_format: base64
              with-dimensions:
                summary: 指定维度
                description: 指定输出维度。
                value:
                  model: deepseek-embed
                  input: Example text
                  dimensions: 256
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应单个输入的基础响应。
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - -0.006929283495992422
                          - -0.005336422007530928
                          - -0.024047505110502243
                        index: 0
                    model: deepseek-embed
                    usage:
                      prompt_tokens: 8
                      total_tokens: 8
                multiple-inputs-response:
                  summary: 多输入响应
                  description: 对应多个输入的响应，包含多个嵌入向量。
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding:
                          - 0.1
                          - 0.2
                          - 0.3
                        index: 0
                      - object: embedding
                        embedding:
                          - 0.4
                          - 0.5
                          - 0.6
                        index: 1
                    model: deepseek-embed
                    usage:
                      prompt_tokens: 6
                      total_tokens: 6
                base64-response:
                  summary: Base64 响应
                  description: 嵌入向量以 base64 编码返回。
                  value:
                    object: list
                    data:
                      - object: embedding
                        embedding: YmFzZTY0X2VuY29kZWRfZGF0YQ==
                        index: 0
                    model: deepseek-embed
                    usage:
                      prompt_tokens: 2
                      total_tokens: 2
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/generations:
    post:
      tags:
        - image_generations_deepseek
      summary: 创建图像
      description: 根据文本提示生成图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageGeneration_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
            examples:
              default:
                summary: 基础
                description: 生成一张 1024x1024 的图像。
                value:
                  model: deepseek-image
                  prompt: A cute cat sitting on a windowsill
                  'n': 1
                  size: 1024x1024
              hd-quality:
                summary: 高清质量
                description: 生成高清质量的图像。
                value:
                  model: deepseek-image
                  prompt: A futuristic cityscape at sunset
                  'n': 1
                  quality: hd
                  size: 1792x1024
              b64-json:
                summary: Base64 格式
                description: 返回 base64 编码的图像数据。
                value:
                  model: deepseek-image
                  prompt: A beautiful landscape
                  'n': 2
                  size: 512x512
                  response_format: b64_json
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 返回包含图像 URL 和可选字段的完整响应。
                  value:
                    created: 1680000000
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: 'https://example.com/images/cat.png'
                        revised_prompt: 'A cute cat sitting on a windowsill, looking out at a garden'
                    usage:
                      total_tokens: 100
                      input_tokens: 50
                      output_tokens: 50
                      input_tokens_details:
                        text_tokens: 10
                        image_tokens: 40
                b64-response:
                  summary: Base64 响应
                  description: 返回包含 base64 编码图像数据和可选字段的响应。
                  value:
                    created: 1680000001
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                        revised_prompt: A beautiful landscape with mountains and a lake
                      - b64_json: iVBORw0KGgoAAAANSUhEUgAA...
                    usage:
                      total_tokens: 200
                      input_tokens: 100
                      output_tokens: 100
                      input_tokens_details:
                        text_tokens: 20
                        image_tokens: 80
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/images/edits:
    post:
      tags:
        - image_edits_deepseek
      summary: 编辑图像
      description: 根据原始图像和文本提示创建编辑后的图像。与 OpenAI 的 Images API 兼容。
      operationId: createImageEdit_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
            encoding:
              images:
                style: form
                explode: true
            examples:
              with-mask:
                summary: 带蒙版
                description: 使用图像、蒙版和提示进行编辑。
                value:
                  model: deepseek-image
                  images:
                    - '@person.png'
                  mask: '@mask.png'
                  prompt: Add a hat to the person
                  'n': 1
                  size: 1024x1024
              no-mask:
                summary: 无蒙版
                description: 仅使用图像和提示进行编辑。
                value:
                  model: deepseek-image
                  images:
                    - '@body-lotion.png'
                  prompt: Change the background to a beach
                  'n': 1
                  size: 1024x1024
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
              examples:
                default-response:
                  summary: 编辑响应
                  description: 返回编辑后的图像及相关元数据。
                  value:
                    created: 1680000002
                    background: opaque
                    output_format: png
                    quality: high
                    size: 1024x1024
                    data:
                      - url: 'https://example.com/images/edited.png'
                        revised_prompt: 'A person with a hat, standing in a sunny park'
                    usage:
                      total_tokens: 120
                      input_tokens: 60
                      output_tokens: 60
                      input_tokens_details:
                        text_tokens: 12
                        image_tokens: 48
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions_deepseek
      summary: 音频转录
      description: 将音频文件转录为文本。与 OpenAI 的 Audio API 兼容。
      operationId: createTranscription_deepseek
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
            examples:
              default:
                summary: 基础
                description: 将音频文件转录为 JSON 格式。
                value:
                  model: deepseek-whisper
                  file: (binary)
                  response_format: json
              with-timestamps:
                summary: 带时间戳
                description: 获取包含单词级时间戳的详细转录。
                value:
                  model: deepseek-whisper
                  file: (binary)
                  response_format: verbose_json
                  timestamp_granularities:
                    - word
              srt-format:
                summary: SRT 字幕
                description: 以 SRT 字幕格式返回转录。
                value:
                  model: deepseek-whisper
                  file: (binary)
                  response_format: srt
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
              examples:
                json-response:
                  summary: JSON 响应
                  description: 默认的 JSON 格式转录。
                  value:
                    text: 'Hello, this is a test transcription.'
                verbose-json-response:
                  summary: 详细 JSON 响应
                  description: 包含单词级时间戳的详细转录。
                  value:
                    task: transcribe
                    language: english
                    duration: 2.95
                    text: 'Hello, this is a test transcription.'
                    words:
                      - word: Hello
                        start: 0.1
                        end: 0.5
                      - word: this
                        start: 0.6
                        end: 0.8
                      - word: is
                        start: 0.9
                        end: 1
                      - word: a
                        start: 1.1
                        end: 1.2
                      - word: test
                        start: 1.3
                        end: 1.8
                      - word: transcription
                        start: 1.9
                        end: 2.8
            application/x-srt:
              schema:
                type: string
                description: SRT 字幕格式的转录。
              examples:
                srt-response:
                  summary: SRT 响应
                  value: |
                    1
                    00:00:00,100 --> 00:00:00,500
                    Hello

                    2
                    00:00:00,600 --> 00:00:00,800
                    this

                    3
                    00:00:00,900 --> 00:00:01,000
                    is

                    4
                    00:00:01,100 --> 00:00:01,200
                    a

                    5
                    00:00:01,300 --> 00:00:01,800
                    test

                    6
                    00:00:01,900 --> 00:00:02,800
                    transcription
            text/plain:
              schema:
                type: string
                description: 纯文本格式的转录。
              examples:
                text-response:
                  summary: 纯文本响应
                  value: 'Hello, this is a test transcription.'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
