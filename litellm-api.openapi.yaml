    x-page-icon: cloud
    description: 阿里千问（DashScope）的向量嵌入 API
  - name: embeddings_openai
    x-parent: embeddings
    x-page-title: OpenAI
    x-page-icon: globe
    description: OpenAI 的向量嵌入 API

  # ========== 第二级分类：图片生成 - 厂家 ==========
  - name: image_generations_deepseek
    x-parent: image_generations
    x-page-title: 深度求索
    x-page-icon: brain
    description: 深度求索（DeepSeek）的图片生成 API
  - name: image_generations_zai
    x-parent: image_generations
    x-page-title: 智谱
    x-page-icon: lightbulb
    description: 智谱（Zai）的图片生成 API
  - name: image_generations_volengine
    x-parent: image_generations
    x-page-title: 字节跳动
    x-page-icon: zap
    description: 字节跳动（VolEngine）的图片生成 API
  - name: image_generations_dashscope
    x-parent: image_generations
    x-page-title: 阿里千问
    x-page-icon: cloud
    description: 阿里千问（DashScope）的图片生成 API
  - name: image_generations_openai
    x-parent: image_generations
