paths:
  # ========== 对话生成 API ==========
  /v1/chat/completions:
    post:
      tags:
        - chat_completions
        - chat_completions_deepseek
        - chat_completions_zai
        - chat_completions_volengine
        - chat_completions_dashscope
        - chat_completions_openai
        - chat_completions_openai_openai
      summary: 创建聊天补全
      description: 基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。
      operationId: createChatCompletion
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  /v1/completions:
    post:
      tags:
        - chat_completions
        - chat_completions_deepseek
        - chat_completions_zai
        - chat_completions_volengine
        - chat_completions_dashscope
        - chat_completions_openai
        - chat_completions_openai_openai
      summary: 创建文本补全
      description: 基于提供的提示，生成一个或多个补全结果。与 OpenAI 的 Completions API 兼容。
      operationId: createCompletion
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompletionRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 向量嵌入 API ==========
  /v1/embeddings:
    post:
      tags:
        - embeddings
        - embeddings_deepseek
        - embeddings_zai
        - embeddings_volengine
        - embeddings_dashscope
        - embeddings_openai
        - embeddings_openai_openai
      summary: 创建嵌入向量
      description: 获取给定输入的向量表示，可用于相似度比较等任务。与 OpenAI 的 Embeddings API 兼容。
      operationId: createEmbedding
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 图片生成 API ==========
  /v1/images/generations:
    post:
      tags:
        - image_generations
        - image_generations_deepseek
        - image_generations_zai
        - image_generations_volengine
        - image_generations_dashscope
        - image_generations_openai
        - image_generations_openai_openai
      summary: 创建图像
      description: 根据文本提示生成图像。与 OpenAI 的 Images API (Create image) 完全兼容。
      operationId: createImageGeneration
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageGenerationRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 图片编辑 API ==========
  /v1/images/edits:
    post:
      tags:
        - image_edits
        - image_edits_deepseek
        - image_edits_zai
        - image_edits_volengine
        - image_edits_dashscope
        - image_edits_openai
        - image_edits_openai_openai
      summary: 编辑图像
      description: 根据原始图像和文本提示创建编辑后的图像。与 OpenAI 的 Images API (Create image edit) 完全兼容。
      operationId: createImageEdit
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateImageEditRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

  # ========== 音频转录 API ==========
  /v1/audio/transcriptions:
    post:
      tags:
        - audio_transcriptions
        - audio_transcriptions_deepseek
        - audio_transcriptions_zai
        - audio_transcriptions_volengine
        - audio_transcriptions_dashscope
        - audio_transcriptions_openai
        - audio_transcriptions_openai_openai
      summary: 音频转录
      description: 将音频文件转录为文本。与 OpenAI 的 Audio API (Create transcription) 完全兼容。
      operationId: createTranscription
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TranscriptionResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'

components:
  schemas:
    CreateChatCompletionRequest:
      type: object
      properties:
        model:
          type: string
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        choices:
          type: array
          items:
            type: object
    CreateCompletionRequest:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
    CompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
        choices:
          type: array
          items:
            type: object
    CreateEmbeddingRequest:
      type: object
      properties:
        model:
          type: string
        input:
          type: string
    EmbeddingResponse:
      type: object
      properties:
        object:
          type: string
        data:
          type: array
          items:
            type: object
    CreateImageGenerationRequest:
      type: object
      properties:
        model:
          type: string
        prompt:
          type: string
    ImageResponse:
      type: object
      properties:
        created:
          type: integer
        data:
          type: array
          items:
            type: object
    CreateImageEditRequest:
      type: object
      properties:
        model:
          type: string
        image:
          type: string
          format: binary
        prompt:
          type: string
    CreateTranscriptionRequest:
      type: object
      properties:
        model:
          type: string
        file:
          type: string
          format: binary
    TranscriptionResponse:
      type: object
      properties:
        text:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
  securitySchemes:
    APIKeyHeader:
      type: apiKey
      name: Authorization
      in: header
