  /v1/embeddings:
    post:
      summary: 创建嵌入向量
      description: 获取给定输入的向量表示，可用于相似度比较等任务。与 OpenAI 的 Embeddings API 兼容。
      operationId: createEmbedding
      tags:
        - Embeddings
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmbeddingRequest'
            examples:
              default:
                summary: 基础
                description: 对单个字符串输入生成嵌入向量。
                value:
                  model: text-embedding-ada-002
                  input: The quick brown fox jumps over the lazy dog
                x-gitbook-description-html: <p>对单个字符串输入生成嵌入向量。</p>
              multiple-inputs:
                summary: 多输入
                description: 对多个字符串输入生成嵌入向量。
                value:
                  model: text-embedding-ada-002
                  input:
                    - Hello world
                    - OpenAI is amazing
                x-gitbook-description-html: <p>对多个字符串输入生成嵌入向量。</p>
              base64-format:
                summary: Base64 格式
                description: 以 base64 编码返回嵌入向量。
                value:
                  model: text-embedding-3-small
                  input: Example text
                  encoding_format: base64
                x-gitbook-description-html: <p>以 base64 编码返回嵌入向量。</p>
              with-dimensions:
                summary: 指定维度
                description: 为 text-embedding-3 模型指定输出维度。
                value:
                  model: text-embedding-3-small
                  input: Example text
                  dimensions: 256
                x-gitbook-description-html: <p>为 text-embedding-3 模型指定输出维度。</p>
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbeddingResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应单个输入的基础响应。
                  value:
