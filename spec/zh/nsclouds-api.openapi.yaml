paths:
  /v1/chat/completions:
    post:
      summary: 创建聊天补全
      description: |-
        基于输入的消息，生成模型回复。与 OpenAI 的 Chat API 完全兼容。

        > 💡 **提示**：选择下方的请求示例后，请手动在响应示例区域选择同名的示例以查看对应的输出。
      operationId: createChatCompletion
      tags:
        - Chat
      security:
        - APIKeyHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatCompletionRequest'
            examples:
              default:
                summary: 基础
                description: 一个简单的对话示例，包含系统提示和用户消息。
                value:
                  model: gpt-4
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Hello!
                  temperature: 1
                  max_completion_tokens: 50
                  'n': 1
                  stream: false
                x-gitbook-description-html: <p>一个简单的对话示例，包含系统提示和用户消息。</p>
              streaming:
                summary: 流式
                description: '通过设置 stream: true 启用流式响应。'
                value:
                  model: gpt-4
                  messages:
                    - role: system
                      content: You are a helpful assistant.
                    - role: user
                      content: Tell me a story.
                  temperature: 0.7
                  max_completion_tokens: 100
                  stream: true
                x-gitbook-description-html: '<p>通过设置 stream: true 启用流式响应。</p>'
              image_input:
                summary: 图像输入（多模态）
                description: 使用支持视觉的模型分析图像。
                value:
                  model: gpt-4-vision-preview
                  messages:
                    - role: user
                      content:
                        - type: text
                          text: What's in this image?
                        - type: image_url
                          image_url:
                            url: https://example.com/cat.jpg
                  max_completion_tokens: 300
                x-gitbook-description-html: <p>使用支持视觉的模型分析图像。</p>
              functions:
                summary: 函数调用
                description: 定义工具（函数）并让模型决定是否调用。
                value:
                  model: gpt-4
                  messages:
                    - role: user
                      content: What's the weather in Boston?
                  tools:
                    - type: function
                      function:
                        name: get_current_weather
                        description: Get the current weather in a given location
                        parameters:
                          type: object
                          properties:
                            location:
                              type: string
                              description: The city and state, e.g. San Francisco, CA
                            unit:
                              type: string
                              enum:
                                - celsius
                                - fahrenheit
                          required:
                            - location
                  tool_choice: auto
                  max_completion_tokens: 150
                x-gitbook-description-html: <p>定义工具（函数）并让模型决定是否调用。</p>
      responses:
        '200':
          description: 成功响应
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
              examples:
                default-response:
                  summary: 基础响应
                  description: 对应基础聊天请求的响应示例。
                  value:
                    id: chatcmpl-123
                    object: chat.completion
                    created: 1677652288
                    model: gpt-4
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: Hello there! How can I assist you today?
                        finish_reason: stop
                    usage:
                      prompt_tokens: 9
                      completion_tokens: 12
                      total_tokens: 21
                  x-gitbook-description-html: <p>对应基础聊天请求的响应示例。</p>
                image_input-response:
                  summary: 图像输入响应
                  description: 模型根据图像内容生成的描述。
                  value:
                    id: chatcmpl-789
                    object: chat.completion
                    created: 1677652300
                    model: gpt-4-vision-preview
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: >-
                            The image shows a cute cat sitting on a windowsill,
                            looking outside.
                        finish_reason: stop
                    usage:
                      prompt_tokens: 123
                      completion_tokens: 15
                      total_tokens: 138
                  x-gitbook-description-html: <p>模型根据图像内容生成的描述。</p>
                functions-response:
                  summary: 函数调用响应
                  description: 模型返回一个函数调用请求。
                  value:
                    id: chatcmpl-abc
                    object: chat.completion
                    created: 1677652310
                    model: gpt-4
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: null
                          tool_calls:
                            - id: call_123
                              type: function
                              function:
                                name: get_current_weather
                                arguments: >-
                                  {"location": "Boston, MA", "unit":
                                  "fahrenheit"}
                        finish_reason: tool_calls
                    usage:
                      prompt_tokens: 50
                      completion_tokens: 20
                      total_tokens: 70
                  x-gitbook-description-html: <p>模型返回一个函数调用请求。</p>
            text/event-stream:
              schema:
                type: string
                description: >-
                  流式响应以 Server-Sent Events 格式返回，每个事件是一行以 'data: ' 开头的 JSON
                  数据块，最后以 'data: [DONE]' 结束。
                x-gitbook-description-html: >-
                  <p>流式响应以 Server-Sent Events 格式返回，每个事件是一行以 'data: ' 开头的 JSON
                  数据块，最后以 'data: [DONE]' 结束。</p>
              examples:
                streaming-response:
                  summary: 流式响应示例
                  description: 展示流式聊天过程中陆续发送的事件。
                  value: >-
                    data:
                    {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{"role":"assistant"},"finish_reason":null}]}

                    data:
                    {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{"content":"Hello"},"finish_reason":null}]}

                    data:
                    {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{"content":"
                    there!"},"finish_reason":null}]}

                    data:
                    {"id":"chatcmpl-123","object":"chat.completion.chunk","created":1677652288,"model":"gpt-4","choices":[{"index":0,"delta":{},"finish_reason":"stop"}]}

                    data: [DONE]
                  x-gitbook-description-html: <p>展示流式聊天过程中陆续发送的事件。</p>
          x-gitbook-description-html: <p>成功响应</p>
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'
